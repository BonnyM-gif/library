<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Riddle Chamber | 50 Enigmas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
      font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* particle canvas (same as before) */
    #particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .orb {
      position: absolute;
      width: 50vmax;
      height: 50vmax;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 242, 255, 0.2), transparent 70%);
      filter: blur(70px);
      animation: floatOrb 18s infinite alternate ease-in-out;
      z-index: 0;
    }

    .orb1 { top: -20%; left: -20%; animation-duration: 22s; background: radial-gradient(circle, rgba(0, 180, 255, 0.25), transparent); }
    .orb2 { bottom: -15%; right: -15%; animation-duration: 19s; background: radial-gradient(circle, rgba(150, 0, 255, 0.2), transparent); }
    .orb3 { top: 40%; left: 30%; width: 30vmax; height: 30vmax; animation-duration: 26s; background: radial-gradient(circle, rgba(0, 255, 200, 0.15), transparent); }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
      100% { transform: translate(8%, 12%) scale(1.2); opacity: 0.8; }
    }

    .container {
      position: relative;
      width: 780px;
      max-width: 90vw;
      padding: 2rem 1.8rem;
      background: rgba(8, 12, 25, 0.55);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      border: 1px solid rgba(0, 242, 255, 0.35);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 242, 255, 0.1) inset, 0 0 25px rgba(0, 242, 255, 0.3);
      text-align: center;
      z-index: 10;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .container:hover {
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1.5px rgba(0, 242, 255, 0.5) inset, 0 0 32px #00f2ff66;
      transform: scale(1.01);
    }

    h2 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e0f2fe, #00f2ff, #2a6eff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
      margin-bottom: 0.3rem;
    }

    .score-area {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      background: rgba(0, 0, 0, 0.5);
      display: inline-block;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      margin: 1rem 0;
      color: #a0e9ff;
    }

    .riddle-box {
      background: rgba(0, 0, 0, 0.45);
      padding: 1.8rem 1.5rem;
      border-radius: 1.5rem;
      font-size: 1.35rem;
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      font-weight: 500;
      min-height: 180px;
      margin: 1rem 0 1.2rem;
      color: #f2e6d5;
      border-left: 4px solid #dbb464;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.3), 0 6px 12px rgba(0,0,0,0.2);
      line-height: 1.5;
      word-break: break-word;
    }

    .riddle-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 1rem 0;
    }

    button {
      background: transparent;
      border: 1.5px solid #b87c4f;
      padding: 0.6rem 1.4rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      border-radius: 40px;
      color: #ecd9b4;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,245,225,0.2);
      backdrop-filter: blur(4px);
    }

    button:hover {
      background: #b87c4f;
      color: #fff6e8;
      border-color: #9b693f;
      transform: translateY(-2px);
    }

    .reset-btn {
      background: rgba(239, 213, 181, 0.3);
      border-color: #c49a6c;
    }

    .back-btn {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: white;
      text-decoration: none;
      margin-top: 1.5rem;
      transition: 0.2s;
      border: 1px solid rgba(0,224,255,0.3);
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateX(-3px);
    }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .riddle-box { font-size: 1.1rem; padding: 1.2rem; }
    }
  </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">
  <h2>🧩 CHAMBER OF RIDDLES</h2>
  <div class="score-area">
    ⭐ Score: <strong id="score">0</strong> / 50
  </div>
  <div id="riddleBox" class="riddle-box">
    Loading riddles...
  </div>
  <div class="riddle-buttons">
    <button onclick="prevRiddle()">◀ Previous</button>
    <button onclick="nextRiddle()">Next ▶</button>
  </div>
  <button onclick="resetScore()" class="reset-btn">Reset Score</button>
  <div>
    <a href="dashboard.html" class="back-btn">← Return to Dashboard</a>
  </div>
</div>

<script>
  // ---------- 50 RIDDLES (mix of classic, logic, wordplay) ----------
  const riddles = [
    { q: "I speak without a mouth. What am I?", a: "Echo" },
    { q: "The more you take, the more you leave behind. What am I?", a: "Footsteps" },
    { q: "What has keys but no locks?", a: "Piano" },
    { q: "What can you catch but not throw?", a: "Cold" },
    { q: "What is always in front of you but can’t be seen?", a: "Future" },
    { q: "I have cities, but no houses. I have mountains, but no trees. What am I?", a: "Map" },
    { q: "What gets wetter as it dries?", a: "Towel" },
    { q: "What has a heart that doesn’t beat?", a: "Artichoke" },
    { q: "I have a face and two hands, but no arms or legs. What am I?", a: "Clock" },
    { q: "What has words but never speaks?", a: "Book" },
    { q: "I can run but never walk, have a mouth but never talk. What am I?", a: "River" },
    { q: "What has an eye but cannot see?", a: "Needle" },
    { q: "What month of the year has 28 days?", a: "All of them" },
    { q: "What is full of holes but still holds water?", a: "Sponge" },
    { q: "What can travel around the world while staying in a corner?", a: "Stamp" },
    { q: "What has a head, a tail, is brown, and has no legs?", a: "Penny" },
    { q: "What has a neck but no head?", a: "Bottle" },
    { q: "What has many teeth but cannot bite?", a: "Comb" },
    { q: "What has a thumb and four fingers but is not alive?", a: "Glove" },
    { q: "What has to be broken before you can use it?", a: "Egg" },
    { q: "I have a door but no house. I have a screen but no computer. What am I?", a: "Net" },
    { q: "What can you hold without ever touching?", a: "Breath" },
    { q: "What has a bottom at the top?", a: "Legs" },
    { q: "What has words but never speaks?", a: "Book" },
    { q: "What is so fragile that saying its name breaks it?", a: "Silence" },
    { q: "What has a ring but no finger?", a: "Telephone" },
    { q: "What has a thousand words but cannot speak?", a: "Dictionary" },
    { q: "What has a face and two hands but no arms or legs?", a: "Clock" },
    { q: "What has a head, a tail, but no body?", a: "Coin" },
    { q: "What has a spine but no bones?", a: "Book" },
    { q: "What has a bark but no bite?", a: "Tree" },
    { q: "What has a sole but no foot?", a: "Shoe" },
    { q: "What has a roof but no ceiling?", a: "Mouth" },
    { q: "What has a heart that doesn’t pump blood?", a: "Artichoke" },
    { q: "What has a foot but no leg?", a: "Snail" },
    { q: "What has a wave but no sea?", a: "Hair" },
    { q: "What has a spring but no autumn?", a: "Watch" },
    { q: "What has a lock but no key?", a: "Wrestling hold" },
    { q: "What has a crown but no king?", a: "Tooth" },
    { q: "What has a wing but cannot fly?", a: "Airplane (wing) / Angel statue" },
    { q: "What has a belt but no pants?", a: "Seatbelt" },
    { q: "What has a tongue but cannot taste?", a: "Shoe" },
    { q: "What has a face but no mouth?", a: "Drum" },
    { q: "What has a stem but no flower?", a: "Pipe" },
    { q: "What has a spine but no vertebrae?", a: "Book" },
    { q: "What has a battery but no electricity?", a: "Jail" },
    { q: "What has a key but no lock?", a: "Keyboard" },
    { q: "What has a date but no calendar?", a: "Fruit" },
    { q: "What has a bark but no leaves?", a: "Dog" },
    { q: "What has a wave but no ocean?", a: "Microwave" }
  ];

  let currentRiddleIndex = 0;
  let currentScore = 0;
  const STORAGE_KEY = "riddle_score_50";

  // Load score from localStorage
  function loadScore() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved !== null) {
      currentScore = parseInt(saved);
    } else {
      currentScore = 0;
    }
    updateScoreDisplay();
  }

  function updateScoreDisplay() {
    document.getElementById("score").innerText = currentScore;
    localStorage.setItem(STORAGE_KEY, currentScore);
  }

  function nextRiddle() {
    currentRiddleIndex = (currentRiddleIndex + 1) % riddles.length;
    renderCurrentRiddle();
  }

  function prevRiddle() {
    currentRiddleIndex = (currentRiddleIndex - 1 + riddles.length) % riddles.length;
    renderCurrentRiddle();
  }

  function renderCurrentRiddle() {
    const box = document.getElementById("riddleBox");
    const r = riddles[currentRiddleIndex];
    box.innerHTML = `
      <div style="font-weight:600; margin-bottom:0.5rem;">❓ Riddle ${currentRiddleIndex+1} of ${riddles.length}</div>
      <div style="font-size:1.2rem;">${escapeHtml(r.q)}</div>
      <div style="margin-top:1rem;">
        <button onclick="revealAnswer('${escapeHtml(r.a).replace(/'/g, "\\'")}')" style="margin-right:0.5rem;">🔍 Reveal Answer</button>
        <button onclick="addPoint()">⭐ +1 point (solved)</button>
      </div>
    `;
  }

  function revealAnswer(answer) {
    alert(`Answer: ${answer}`);
  }

  function addPoint() {
    currentScore++;
    updateScoreDisplay();
    alert("➕ +1 point! Great job!");
  }

  function resetScore() {
    if (confirm("Reset your score to 0?")) {
      currentScore = 0;
      updateScoreDisplay();
      alert("Score reset to 0");
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ---------- Particle network (same as login) ----------
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let width, height, particles = [];
  const PARTICLE_COUNT = 75, MAX_DIST = 130;
  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * width, y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.3,
        radius: Math.random() * 2.2 + 1.2,
        color: `rgba(0, ${180 + Math.random() * 75}, 255, ${0.2 + Math.random() * 0.5})`
      });
    }
  }
  function resizeCanvas() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    initParticles();
  }
  function drawParticles() {
    ctx.clearRect(0, 0, width, height);
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color; ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = width; if (p.x > width) p.x = 0;
      if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;
    }
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.hypot(dx, dy);
        if (dist < MAX_DIST) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(0, 200, 255, ${0.08 * (1 - dist / MAX_DIST)})`;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(drawParticles);
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  drawParticles();

  // Initialize
  loadScore();
  renderCurrentRiddle();
</script>
</body>
</html>
