<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin Library | Book Management with URLs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0c12;
      --card-bg: rgba(18, 22, 35, 0.75);
      --card-border: rgba(66, 153, 225, 0.3);
      --glow-primary: #00e0ff;
      --glow-accent: #a855f7;
      --text-primary: #eef2ff;
      --text-secondary: #9ca3af;
      --danger: #ff4d6d;
      --success: #10b981;
      --warning: #f59e0b;
      --radius-lg: 1.5rem;
      --radius-md: 1rem;
      --transition: all 0.2s ease;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 20% 30%, #0c0f1c, #03050b);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 1.5rem;
      color: var(--text-primary);
    }

    /* animated background */
    .bg-particles {
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(circle at 25% 40%, rgba(0,224,255,0.05) 1px, transparent 1px),
        radial-gradient(circle at 75% 85%, rgba(168,85,247,0.05) 1px, transparent 1px);
      background-size: 48px 48px, 64px 64px;
      animation: drift 120s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes drift {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 200px 200px, -150px 150px; }
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0,224,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,224,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* main container */
    .admin-container {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(66,153,225,0.3);
    }
    .admin-header h1 {
      font-size: 2rem;
      background: linear-gradient(125deg, #fff, #00e0ff, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .stats-badge {
      background: rgba(0,224,255,0.2);
      backdrop-filter: blur(8px);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      border: 1px solid var(--glow-primary);
    }

    /* two-column layout */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1.8rem;
    }

    /* form card */
    .form-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
      padding: 1.5rem;
      transition: var(--transition);
    }
    .form-card h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
      color: var(--text-secondary);
    }
    .form-group input, .form-group textarea {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(66,153,225,0.4);
      border-radius: var(--radius-md);
      padding: 0.7rem 1rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: var(--transition);
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--glow-primary);
      box-shadow: 0 0 0 2px rgba(0,224,255,0.2);
    }
    .form-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1rem;
    }
    button {
      background: linear-gradient(95deg, #1e293b, #0f172a);
      border: 1px solid var(--glow-primary);
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.85rem;
    }
    button:hover {
      background: linear-gradient(95deg, #2d3a5e, #1e293b);
      box-shadow: 0 0 10px rgba(0,224,255,0.4);
      transform: translateY(-1px);
    }
    .btn-danger {
      border-color: var(--danger);
    }
    .btn-danger:hover {
      box-shadow: 0 0 10px rgba(255,77,109,0.4);
    }
    .btn-success {
      border-color: var(--success);
    }
    .btn-success:hover {
      box-shadow: 0 0 10px rgba(16,185,129,0.4);
    }

    /* books table */
    .books-section {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
      padding: 1.5rem;
      overflow-x: auto;
    }
    .books-section h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 0.9rem 0.5rem;
      border-bottom: 1px solid rgba(66,153,225,0.2);
    }
    th {
      color: var(--glow-primary);
      font-weight: 600;
      font-size: 0.85rem;
    }
    td {
      font-size: 0.85rem;
      vertical-align: middle;
    }
    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }
    .action-buttons button {
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      background: rgba(0,0,0,0.5);
    }
    .url-link {
      color: var(--glow-accent);
      text-decoration: none;
      font-size: 0.8rem;
      transition: var(--transition);
    }
    .url-link:hover {
      color: var(--glow-primary);
      text-decoration: underline;
    }
    .empty-row td {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }
    @media (max-width: 800px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      .admin-header {
        flex-direction: column;
        align-items: start;
      }
    }
    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      background: #0a0c12;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(#00e0ff, #a855f7);
      border-radius: 10px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      font-size: 0.85rem;
      border-left: 3px solid var(--glow-primary);
      z-index: 1000;
      transition: opacity 0.3s;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="bg-particles"></div>
<div class="grid-overlay"></div>

<div class="admin-container">
  <div class="admin-header">
    <h1>📚 Admin Library · Book Management</h1>
    <div class="stats-badge" id="totalBooksStat">Total books: 0</div>
  </div>

  <div class="dashboard-grid">
    <!-- Book form (add / edit) -->
    <div class="form-card">
      <h2>
        <span id="formIcon">➕</span>
        <span id="formTitle">Add New Book</span>
      </h2>
      <form id="bookForm">
        <input type="hidden" id="bookId" value="">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="title" required placeholder="e.g., The Elegant Universe">
        </div>
        <div class="form-group">
          <label>Author *</label>
          <input type="text" id="author" required placeholder="Brian Greene">
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="year" placeholder="1999">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="3" placeholder="Brief description..."></textarea>
        </div>
        <div class="form-group">
          <label>Icon (emoji)</label>
          <input type="text" id="icon" placeholder="📖" value="📖">
        </div>
        <div class="form-group">
          <label>URL (link to book page)</label>
          <input type="url" id="url" placeholder="https://example.com/book">
        </div>
        <div class="form-actions">
          <button type="submit" id="submitBtn">➕ Add Book</button>
          <button type="button" id="cancelBtn" class="btn-danger" style="display: none;">Cancel Edit</button>
        </div>
      </form>
    </div>

    <!-- Books list -->
    <div class="books-section">
      <h2>📖 Book Inventory</h2>
      <div style="overflow-x: auto;">
        <table id="booksTable">
          <thead>
            <tr><th>Icon</th><th>Title</th><th>Author</th><th>Year</th><th>URL</th><th>Actions</th> </tr>
          </thead>
          <tbody id="booksTableBody">
            <tr class="empty-row"><td colspan="6">Loading books...<\/td><\/tr>
          </tbody>
        <\/table>
      <\/div>
    <\/div>
  <\/div>
<\/div>

<script>
  // Book data store (localStorage)
  let books = [];

  // Load from localStorage
  function loadBooks() {
    const stored = localStorage.getItem('admin_library_books');
    if (stored) {
      books = JSON.parse(stored);
    } else {
      // seed some demo books with URLs
      books = [
        { id: '1', title: 'The Feynman Lectures on Physics', author: 'Feynman, Leighton, Sands', year: 1963, description: 'Classic three-volume set covering all of physics.', icon: '📖', url: 'https://www.feynmanlectures.caltech.edu/' },
        { id: '2', title: 'Gravitation', author: 'Misner, Thorne, Wheeler', year: 1973, description: 'The definitive reference on general relativity.', icon: '🌌', url: 'https://press.princeton.edu/books/hardcover/9780691177798/gravitation' },
        { id: '3', title: 'Quantum Mechanics and Path Integrals', author: 'Feynman & Hibbs', year: 1965, description: 'Elegant formulation of quantum theory.', icon: '⚛️', url: '' }
      ];
      saveBooks();
    }
    renderBooksTable();
    updateStats();
  }

  function saveBooks() {
    localStorage.setItem('admin_library_books', JSON.stringify(books));
  }

  function updateStats() {
    document.getElementById('totalBooksStat').innerText = `Total books: ${books.length}`;
  }

  // generate simple ID
  function generateId() {
    return Date.now().toString() + '-' + Math.random().toString(36).substr(2, 6);
  }

  // add or update
  function handleSubmit(e) {
    e.preventDefault();
    const id = document.getElementById('bookId').value;
    const title = document.getElementById('title').value.trim();
    const author = document.getElementById('author').value.trim();
    const year = parseInt(document.getElementById('year').value);
    const description = document.getElementById('description').value.trim();
    const icon = document.getElementById('icon').value.trim() || '📖';
    const url = document.getElementById('url').value.trim();

    if (!title || !author) {
      showToast('Title and Author are required', '#ff4d6d');
      return;
    }

    if (id) {
      // update existing
      const index = books.findIndex(b => b.id === id);
      if (index !== -1) {
        books[index] = { ...books[index], title, author, year: isNaN(year) ? '' : year, description, icon, url };
        showToast('Book updated successfully', '#10b981');
      }
    } else {
      // add new
      const newBook = {
        id: generateId(),
        title,
        author,
        year: isNaN(year) ? '' : year,
        description,
        icon,
        url: url || ''
      };
      books.push(newBook);
      showToast('Book added successfully', '#10b981');
    }
    saveBooks();
    renderBooksTable();
    updateStats();
    resetForm();
  }

  function editBook(id) {
    const book = books.find(b => b.id === id);
    if (!book) return;
    document.getElementById('bookId').value = book.id;
    document.getElementById('title').value = book.title;
    document.getElementById('author').value = book.author;
    document.getElementById('year').value = book.year || '';
    document.getElementById('description').value = book.description || '';
    document.getElementById('icon').value = book.icon || '📖';
    document.getElementById('url').value = book.url || '';
    document.getElementById('formTitle').innerText = '✏️ Edit Book';
    document.getElementById('formIcon').innerText = '✏️';
    document.getElementById('submitBtn').innerHTML = '✏️ Update Book';
    document.getElementById('cancelBtn').style.display = 'inline-block';
  }

  function deleteBook(id) {
    if (confirm('Are you sure you want to delete this book?')) {
      books = books.filter(b => b.id !== id);
      saveBooks();
      renderBooksTable();
      updateStats();
      resetForm();
      showToast('Book deleted', '#ff4d6d');
    }
  }

  function resetForm() {
    document.getElementById('bookForm').reset();
    document.getElementById('bookId').value = '';
    document.getElementById('formTitle').innerText = 'Add New Book';
    document.getElementById('formIcon').innerText = '➕';
    document.getElementById('submitBtn').innerHTML = '➕ Add Book';
    document.getElementById('cancelBtn').style.display = 'none';
    // optional: set default icon
    document.getElementById('icon').value = '📖';
  }

  function renderBooksTable() {
    const tbody = document.getElementById('booksTableBody');
    if (!books.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No books yet. Add your first book! 📚<\/td><\/tr>';
      return;
    }
    tbody.innerHTML = books.map(book => {
      const urlCell = book.url && book.url.trim() !== '' 
        ? `<a href="${escapeHtml(book.url)}" target="_blank" rel="noopener noreferrer" class="url-link">🔗 Visit</a>` 
        : '—';
      return `
        <tr>
          <td style="font-size:1.5rem;">${escapeHtml(book.icon) || '📖'}<\/td>
          <td><strong>${escapeHtml(book.title)}<\/strong><\/td>
          <td>${escapeHtml(book.author)}<\/td>
          <td>${book.year || '—'}<\/td>
          <td>${urlCell}<\/td>
          <td class="action-buttons">
            <button class="btn-success" onclick="editBook('${book.id}')">Edit</button>
            <button class="btn-danger" onclick="deleteBook('${book.id}')">Delete</button>
          <\/td>
        <\/tr>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function showToast(message, color = '#00e0ff') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = message;
    toast.style.borderLeftColor = color;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 400);
    }, 2000);
  }

  // event listeners
  document.getElementById('bookForm').addEventListener('submit', handleSubmit);
  document.getElementById('cancelBtn').addEventListener('click', resetForm);

  // initial load
  loadBooks();
<\/script>
<\/body>
<\/html>
