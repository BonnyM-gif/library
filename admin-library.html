<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Cloud Books</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background: #f1f5f9; }
    .card { transition: all 0.2s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="p-6">
<div class="max-w-6xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-indigo-800">📚 SMUK Book Manager</h1>
    <a href="admin.html" class="bg-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300">← Back to Admin</a>
  </div>

  <!-- Add / Edit Form -->
  <div class="bg-white rounded-xl shadow-md p-6 mb-8">
    <h2 class="text-xl font-semibold mb-4" id="formTitle">Add New Book</h2>
    <input type="hidden" id="bookId">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="text" id="title" placeholder="Title *" class="border rounded-lg p-2">
      <input type="text" id="author" placeholder="Author *" class="border rounded-lg p-2">
      <input type="text" id="year" placeholder="Year (optional)" class="border rounded-lg p-2">
      <input type="url" id="url" placeholder="Book URL (PDF or external link) *" class="border rounded-lg p-2">
      <select id="type" class="border rounded-lg p-2">
        <option value="link">🔗 External Link</option>
        <option value="pdf">📄 PDF File (URL)</option>
      </select>
      <textarea id="description" rows="2" placeholder="Description (optional)" class="border rounded-lg p-2"></textarea>
    </div>
    <div class="mt-4 flex gap-2">
      <button id="saveBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">Save Book</button>
      <button id="cancelBtn" class="bg-gray-400 text-white px-4 py-2 rounded-lg hover:bg-gray-500 hidden">Cancel</button>
    </div>
  </div>

  <!-- Books List (real-time) -->
  <div class="bg-white rounded-xl shadow-md p-6">
    <h2 class="text-xl font-semibold mb-4">Existing Books</h2>
    <div id="booksList" class="space-y-2">
      <div class="text-center py-8 text-gray-500">Loading books...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getDatabase, ref, push, set, remove, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBR0RDkC8SsT7v89eH4qBX6q_87UyqcYWc",
    authDomain: "smuk-library.firebaseapp.com",
    databaseURL: "https://smuk-library-default-rtdb.firebaseio.com/",
    projectId: "smuk-library",
    storageBucket: "smuk-library.firebasestorage.app",
    messagingSenderId: "101518774671",
    appId: "1:101518774671:web:24c6c9c2574f230639fbfa",
    measurementId: "G-9M8VW7EL0B"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const booksRef = ref(db, 'books');

  let currentUserRole = null;
  let editingId = null;

  // DOM elements
  const titleInput = document.getElementById('title');
  const authorInput = document.getElementById('author');
  const yearInput = document.getElementById('year');
  const urlInput = document.getElementById('url');
  const typeSelect = document.getElementById('type');
  const descInput = document.getElementById('description');
  const saveBtn = document.getElementById('saveBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const formTitle = document.getElementById('formTitle');
  const booksListDiv = document.getElementById('booksList');

  // Save book (add or update)
  async function saveBook() {
    const title = titleInput.value.trim();
    const author = authorInput.value.trim();
    const url = urlInput.value.trim();
    if (!title || !author || !url) {
      alert("Title, Author and URL are required.");
      return;
    }

    const bookData = {
      title,
      author,
      year: yearInput.value.trim() || '',
      url,
      type: typeSelect.value,
      description: descInput.value.trim() || '',
      updatedAt: new Date().toISOString()
    };

    try {
      if (editingId) {
        // Update existing book
        await set(ref(db, `books/${editingId}`), bookData);
        alert("Book updated!");
      } else {
        // Add new book
        const newRef = push(booksRef);
        await set(newRef, { ...bookData, createdAt: new Date().toISOString() });
        alert("Book added!");
      }
      resetForm();
    } catch (err) {
      console.error(err);
      alert("Error saving book: " + err.message);
    }
  }

  // Edit book
  function editBook(id, data) {
    editingId = id;
    titleInput.value = data.title || '';
    authorInput.value = data.author || '';
    yearInput.value = data.year || '';
    urlInput.value = data.url || '';
    typeSelect.value = data.type || 'link';
    descInput.value = data.description || '';
    formTitle.innerText = "✏️ Edit Book";
    cancelBtn.classList.remove('hidden');
  }

  // Delete book
  async function deleteBook(id) {
    if (confirm("Delete this book permanently?")) {
      try {
        await remove(ref(db, `books/${id}`));
        alert("Book deleted.");
      } catch (err) {
        alert("Error deleting: " + err.message);
      }
    }
  }

  // Reset form
  function resetForm() {
    editingId = null;
    titleInput.value = '';
    authorInput.value = '';
    yearInput.value = '';
    urlInput.value = '';
    typeSelect.value = 'link';
    descInput.value = '';
    formTitle.innerText = "Add New Book";
    cancelBtn.classList.add('hidden');
  }

  // Render books list in real-time
  function renderBooks(snapshot) {
    const books = snapshot.val();
    if (!books) {
      booksListDiv.innerHTML = '<div class="text-center py-8 text-gray-500">No books yet. Add your first book!</div>';
      return;
    }
    const booksArray = Object.entries(books).map(([id, data]) => ({ id, ...data }));
    booksArray.sort((a,b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

    booksListDiv.innerHTML = booksArray.map(book => `
      <div class="border rounded-lg p-3 flex flex-wrap justify-between items-center gap-2 bg-white shadow-sm">
        <div class="flex-1">
          <div class="font-semibold">${escapeHtml(book.title)}</div>
          <div class="text-sm text-gray-600">${escapeHtml(book.author)} ${book.year ? `(${book.year})` : ''}</div>
          <div class="text-xs text-gray-400">${book.type === 'pdf' ? '📄 PDF' : '🔗 Link'}</div>
        </div>
        <div class="flex gap-2">
          <button onclick="window.editBook('${book.id}', ${JSON.stringify(book).replace(/"/g, '&quot;')})" class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600">Edit</button>
          <button onclick="window.deleteBook('${book.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // Expose functions to global scope for onclick
  window.editBook = editBook;
  window.deleteBook = deleteBook;

  // Authentication and role check
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }
    // Check if user is admin
    const userRef = ref(db, `users/${user.uid}`);
    const snapshot = await new Promise((resolve) => onValue(userRef, resolve, { onlyOnce: true }));
    const userData = snapshot.val();
    if (!userData || userData.role !== 'admin') {
      alert("Access denied. Admin only.");
      window.location.href = "dashboard.html";
      return;
    }
    // Listen to books in real time
    onValue(booksRef, renderBooks);
  });

  saveBtn.addEventListener('click', saveBook);
  cancelBtn.addEventListener('click', resetForm);
</script>
</body>
</html>
