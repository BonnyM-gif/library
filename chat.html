<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SMUK CHATROOM</title>
    <!-- Google Font & Simple Icons (Font Awesome) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, #0c0f1c, #03050b);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
            color: #eef2ff;
        }

        /* dashboard background layers */
        .particle-field {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at 25% 40%, rgba(0,224,255,0.08) 1px, transparent 1px),
                radial-gradient(circle at 75% 85%, rgba(168,85,247,0.08) 1px, transparent 1px);
            background-size: 48px 48px, 64px 64px;
            animation: driftParticles 120s linear infinite;
        }

        @keyframes driftParticles {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 200px 200px, -150px 150px; }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,224,255,0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,224,255,0.12) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* main chat container – glassmorphic card (same as before, but with matching shadow) */
        .chat-app {
            position: relative;
            z-index: 10;
            max-width: 1300px;
            width: 100%;
            height: 90vh;
            background: rgba(18, 25, 40, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(66, 153, 225, 0.25);
        }

        /* header area */
        .chat-header {
            padding: 1.2rem 1.8rem;
            background: rgba(10, 18, 28, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 0.8rem;
        }

        .brand h2 {
            font-weight: 600;
            font-size: 1.55rem;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .brand h2 i {
            background: none;
            color: #5f9eff;
            font-size: 1.6rem;
            background-clip: unset;
            -webkit-background-clip: unset;
        }

        .badge {
            background: rgba(95, 158, 255, 0.18);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #9bbdff;
            border: 1px solid rgba(95, 158, 255, 0.3);
        }

        /* user panel */
        .user-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.7rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.3rem 1rem 0.3rem 1.2rem;
            border-radius: 60px;
        }

        .user-panel label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #b9ceff;
        }

        #usernameInput {
            background: #0f1622;
            border: 1px solid #2a3a5a;
            color: white;
            padding: 0.5rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            width: 140px;
            font-weight: 500;
            transition: 0.2s;
        }

        #usernameInput:focus {
            outline: none;
            border-color: #5f9eff;
            box-shadow: 0 0 0 2px rgba(95, 158, 255, 0.2);
        }

        .icon-btn {
            background: #1e2a3e;
            border: none;
            color: #cfdef5;
            padding: 0.45rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn i {
            font-size: 0.8rem;
        }

        .icon-btn:hover {
            background: #2e3d58;
            color: white;
            transform: translateY(-1px);
        }

        .danger-btn {
            background: rgba(180, 70, 80, 0.2);
            color: #ffb4a2;
            border: 1px solid rgba(255, 120, 100, 0.3);
        }

        .danger-btn:hover {
            background: #c23b2e80;
            color: white;
        }

        /* message stream */
        .message-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        /* custom scroll */
        .message-area::-webkit-scrollbar {
            width: 5px;
        }

        .message-area::-webkit-scrollbar-track {
            background: #0f1420;
            border-radius: 10px;
        }

        .message-area::-webkit-scrollbar-thumb {
            background: #2f405b;
            border-radius: 10px;
        }

        /* chat bubble */
        .message-bubble {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeSlideUp 0.2s ease-out;
        }

        .own-message {
            align-self: flex-end;
            align-items: flex-end;
        }

        .other-message {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bubble-content {
            padding: 0.7rem 1.2rem;
            border-radius: 1.8rem;
            word-break: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .own-message .bubble-content {
            background: linear-gradient(125deg, #2c6bff, #1e4fcf);
            color: white;
            border-bottom-right-radius: 0.4rem;
        }

        .other-message .bubble-content {
            background: rgba(30, 40, 55, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #eef4ff;
            border-bottom-left-radius: 0.4rem;
        }

        .message-meta {
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
            font-size: 0.7rem;
            margin-top: 0.25rem;
            padding: 0 0.4rem;
            color: #8b9bc2;
        }

        .sender-name {
            font-weight: 600;
            color: #c8ddff;
        }

        .own-message .sender-name {
            color: #ffdfb8;
        }

        .timestamp {
            font-size: 0.65rem;
            opacity: 0.7;
        }

        /* input panel */
        .input-panel {
            padding: 1rem 1.5rem 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-group {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        #messageInput {
            flex: 1;
            background: #0e1422;
            border: 1px solid #293856;
            border-radius: 3rem;
            padding: 0.9rem 1.4rem;
            font-family: 'Inter', monospace;
            font-size: 0.9rem;
            color: #f0f3fc;
            resize: none;
            transition: 0.2s;
        }

        #messageInput:focus {
            outline: none;
            border-color: #5f9eff;
            box-shadow: 0 0 0 2px #1e3a8a30;
        }

        .send-btn {
            background: #2b5fdb;
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(43, 95, 219, 0.25);
        }

        .send-btn:hover {
            background: #1e4ac4;
            transform: scale(0.97);
        }

        .helper-text {
            margin-top: 0.6rem;
            font-size: 0.7rem;
            color: #6b7c9e;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .helper-text i {
            margin-right: 4px;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* responsive */
        @media (max-width: 650px) {
            .chat-app {
                height: 95vh;
                border-radius: 1.5rem;
            }
            .message-bubble {
                max-width: 85%;
            }
            .user-panel {
                width: 100%;
                justify-content: center;
            }
            .brand h2 {
                font-size: 1.3rem;
            }
            .input-group {
                flex-direction: column;
            }
            .send-btn {
                width: 100%;
                justify-content: center;
            }
            #messageInput {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- dashboard background layers -->
    <div class="particle-field"></div>
    <div class="grid-overlay"></div>

    <div class="chat-app">
        <div class="chat-header">
            <div class="brand">
                <h2><i class="fas fa-comment-dots"></i> Smuk chatroom</h2>
                <div class="badge"><i class="fas fa-globe"></i> cross‑tab · live</div>
            </div>
            <div class="user-panel">
                <label><i class="fas fa-user-astronaut"></i> Giants</label>
                <input type="text" id="usernameInput" placeholder="Your name" maxlength="24">
                <button id="setUsernameBtn" class="icon-btn"><i class="fas fa-check-circle"></i> Set</button>
                <button id="clearChatBtn" class="icon-btn danger-btn"><i class="fas fa-trash-alt"></i> Clear</button>
            </div>
        </div>

        <div class="message-area" id="messageContainer">
            <!-- messages injected dynamically -->
            <div style="text-align: center; opacity: 0.6; padding: 2rem;">loading conversation...</div>
        </div>

        <div class="input-panel">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your message...  ✨" autocomplete="off">
                <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
            <div class="helper-text">
                <i class="fas fa-window-restore"></i> Open this page in two different tabs/windows → real chat across tabs!  
                <i class="fas fa-sync-alt"></i> messages sync instantly
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- DOM elements ----------
            const messageContainer = document.getElementById('messageContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const usernameInput = document.getElementById('usernameInput');
            const setUsernameBtn = document.getElementById('setUsernameBtn');
            const clearChatBtn = document.getElementById('clearChatBtn');

            // ---------- Storage keys ----------
            const MESSAGES_KEY = 'smuk_chatroom_chat_messages';
            const USERNAME_SESSION_KEY = 'smuk_chatroom_local_username';  // sessionStorage (tab-specific)

            // ---------- Global state ----------
            let currentUsername = '';

            // ---------- Helper: Load / Save messages from localStorage ----------
            function getStoredMessages() {
                const raw = localStorage.getItem(MESSAGES_KEY);
                if (!raw) return null;
                try {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) return parsed;
                    return null;
                } catch(e) {
                    return null;
                }
            }

            function saveMessagesToLocalStorage(messagesArray) {
                localStorage.setItem(MESSAGES_KEY, JSON.stringify(messagesArray));
            }

            // Initialize default messages (only if empty)
            function initDefaultMessages() {
                const existing = getStoredMessages();
                if (!existing || existing.length === 0) {
                    const welcomeMsg = {
                        id: `sys_${Date.now()}_1`,
                        text: "✨ Welcome to Smuk chatroom! ✨\nOpen this page in another tab/window → type a message → see it appear here instantly. Change your alias anytime. Have fun!",
                        sender: "Smuk",
                        timestamp: Date.now() - 60000
                    };
                    const exampleMsg = {
                        id: `sys_${Date.now()}_2`,
                        text: "💬 Cross-tab magic: messages are shared across all tabs using localStorage + storage events. Try sending a message from another window!",
                        sender: "Smuk",
                        timestamp: Date.now() - 30000
                    };
                    saveMessagesToLocalStorage([welcomeMsg, exampleMsg]);
                    return [welcomeMsg, exampleMsg];
                }
                return existing;
            }

            // ---------- Render messages (sorted by timestamp, oldest first) ----------
            function renderMessages() {
                const messages = getStoredMessages();
                if (!messages || messages.length === 0) {
                    messageContainer.innerHTML = `<div style="text-align:center; padding:2rem; color:#7e8aa8;"><i class="fas fa-comment-slash"></i> No messages yet — start the conversation!</div>`;
                    return;
                }

                // sort ascending by timestamp (oldest at top)
                const sorted = [...messages].sort((a,b) => a.timestamp - b.timestamp);
                
                let html = '';
                for (const msg of sorted) {
                    const isOwn = (msg.sender === currentUsername && msg.sender !== 'System');
                    const bubbleClass = isOwn ? 'own-message' : 'other-message';
                    const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
                    const displaySender = msg.sender === currentUsername ? `${msg.sender} (You)` : msg.sender;
                    
                    // Escape message to avoid injection but preserve line breaks (simple)
                    const safeText = escapeHtml(msg.text).replace(/\n/g, '<br>');
                    
                    html += `
                        <div class="message-bubble ${bubbleClass}">
                            <div class="bubble-content">
                                ${safeText}
                            </div>
                            <div class="message-meta">
                                <span class="sender-name"><i class="fas fa-user-circle"></i> ${escapeHtml(displaySender)}</span>
                                <span class="timestamp"><i class="far fa-clock"></i> ${timeStr}</span>
                            </div>
                        </div>
                    `;
                }
                messageContainer.innerHTML = html;
                // auto-scroll to bottom
                messageContainer.scrollTop = messageContainer.scrollHeight;
            }

            // simple XSS protection
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                    return c;
                });
            }

            // ---------- Add a new message (core) ----------
            function addNewMessage(text, senderName) {
                if (!text || text.trim() === '') return false;
                const trimmedText = text.trim();
                const newMessage = {
                    id: `${Date.now()}_${Math.random().toString(36).substring(2, 8)}`,
                    text: trimmedText,
                    sender: senderName,
                    timestamp: Date.now()
                };
                
                // read current, push, save
                const currentMessages = getStoredMessages();
                if (!currentMessages) {
                    saveMessagesToLocalStorage([newMessage]);
                } else {
                    currentMessages.push(newMessage);
                    saveMessagesToLocalStorage(currentMessages);
                }
                // trigger re-render for this tab + storage event will update others
                renderMessages();
                return true;
            }

            // ---------- Clear all messages (with confirm) ----------
            function clearAllMessages() {
                const confirmClear = confirm("⚠️ Clear entire chat history? This will delete all messages for ALL tabs.");
                if (!confirmClear) return;
                saveMessagesToLocalStorage([]);
                // re-init with fresh system hint? but cleaner: empty chat, but we push a small system info.
                const systemNote = {
                    id: `sys_clear_${Date.now()}`,
                    text: "🗑️ Chat history cleared. Start fresh! (open another tab to continue cross-tab chat)",
                    sender: "System",
                    timestamp: Date.now()
                };
                const freshArr = [systemNote];
                saveMessagesToLocalStorage(freshArr);
                renderMessages();
            }

            // ---------- Username management (tab-specific) ----------
            function loadCurrentUsername() {
                let storedName = sessionStorage.getItem(USERNAME_SESSION_KEY);
                if (!storedName) {
                    const randomId = Math.floor(Math.random() * 900) + 100;
                    storedName = `Student${randomId}`;
                    sessionStorage.setItem(USERNAME_SESSION_KEY, storedName);
                }
                currentUsername = storedName;
                usernameInput.value = currentUsername;
            }

            function updateUsername(newName) {
                if (!newName || newName.trim() === '') {
                    alert("Username can't be empty!");
                    return false;
                }
                const cleanName = newName.trim().substring(0, 24);
                if (cleanName.length === 0) return false;
                currentUsername = cleanName;
                sessionStorage.setItem(USERNAME_SESSION_KEY, currentUsername);
                usernameInput.value = currentUsername;
                // re-render messages to update "You" indicators
                renderMessages();
                return true;
            }

            // ---------- Send action ----------
            function handleSendMessage() {
                const rawMsg = messageInput.value;
                if (!rawMsg.trim()) {
                    // subtle shake effect? just ignore
                    messageInput.style.borderColor = "#ff8888";
                    setTimeout(() => { messageInput.style.borderColor = "#293856"; }, 400);
                    return;
                }
                const success = addNewMessage(rawMsg, currentUsername);
                if (success) {
                    messageInput.value = '';
                    messageInput.focus();
                }
            }

            // ---------- Sync across tabs using 'storage' event ----------
            function onStorageEvent(event) {
                // listen only to changes on our MESSAGES_KEY
                if (event.key === MESSAGES_KEY) {
                    // messages updated in another tab → re-render current view
                    renderMessages();
                }
                // optional: could also listen to username changes? no need, username is session based.
            }

            // ---------- Additional: ensure input enter key works ----------
            function setupEventListeners() {
                sendBtn.addEventListener('click', handleSendMessage);
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSendMessage();
                    }
                });
                setUsernameBtn.addEventListener('click', () => {
                    const newName = usernameInput.value.trim();
                    if (newName && newName !== currentUsername) {
                        updateUsername(newName);
                        // subtle user feedback
                        const notif = document.createElement('div');
                        // no intrusive toasts, just re-render
                    } else if (!newName) {
                        alert("Please enter a valid username");
                    } else if (newName === currentUsername) {
                        // same name, nothing changes
                    }
                });
                clearChatBtn.addEventListener('click', clearAllMessages);
                // manual focus & optional clear
                window.addEventListener('storage', onStorageEvent);
            }

            // ---------- initial page load & health check for corrupt data ----------
            function bootstrap() {
                loadCurrentUsername();     // load from sessionStorage (tab identity)
                // ensure messages array exists + valid structure
                let messages = getStoredMessages();
                if (!messages) {
                    // brand new site
                    const defaultMsgs = initDefaultMessages();
                    saveMessagesToLocalStorage(defaultMsgs);
                } else {
                    // validate each message has required fields, else fix
                    let valid = true;
                    for (let i = 0; i < messages.length; i++) {
                        if (!messages[i].id || !messages[i].text || !messages[i].sender || !messages[i].timestamp) {
                            valid = false;
                            break;
                        }
                    }
                    if (!valid || messages.some(m => typeof m.timestamp !== 'number')) {
                        // data corrupted: reset to clean state with a warning system message
                        const resetMsg = {
                            id: `reset_${Date.now()}`,
                            text: "⚠️ Chat history was repaired due to data inconsistency. Fresh start.",
                            sender: "Smuk",
                            timestamp: Date.now()
                        };
                        saveMessagesToLocalStorage([resetMsg]);
                    }
                }
                renderMessages();
                setupEventListeners();
                // Also call render on any external storage event (already done)
                // For double safety, check also if we missed any update
            }

            // optional: re-render on visibility change (just to be extra safe)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    renderMessages();
                }
            });

            bootstrap();
        })();
    </script>
