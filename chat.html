<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💬 SMUK Chatroom | Public Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-storage-compat.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(145deg, #e0e7ff 0%, #f3e8ff 100%); }
    .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
    .message-slide { animation: fadeSlideUp 0.2s ease-out; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .online-indicator { width: 10px; height: 10px; background-color: #22c55e; border-radius: 50%; box-shadow: 0 0 0 2px white; }
    .chat-scroll::-webkit-scrollbar { width: 4px; }
  </style>
</head>
<body class="p-4 md:p-6">
<div class="max-w-7xl mx-auto">
  <div class="glass-panel rounded-2xl p-3 mb-5 flex flex-wrap justify-between items-center shadow-xl">
    <div class="flex items-center gap-3"><div class="bg-gradient-to-tr from-emerald-500 to-teal-500 p-2.5 rounded-2xl"><i class="fab fa-whatsapp text-white text-xl"></i></div><div><h1 class="text-xl md:text-2xl font-bold bg-gradient-to-r from-indigo-800 to-purple-800 bg-clip-text text-transparent">SMUK Chatroom</h1><p class="text-xs text-gray-500">Public chat · no login needed</p></div></div>
    <div class="flex items-center gap-3"><span id="currentUserSpan" class="text-sm font-semibold bg-white/50 px-3 py-1.5 rounded-full shadow-sm"></span><a href="dashboard.html" class="p-2 rounded-full bg-white/50 text-indigo-500 hover:scale-105"><i class="fas fa-arrow-left"></i></a></div>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="glass-panel rounded-2xl p-4 shadow-xl">
      <div class="flex justify-between items-center mb-4"><h2 class="font-bold"><i class="fas fa-comments text-indigo-500"></i> Chats</h2></div>
      <div id="groupsList" class="space-y-2 max-h-80 overflow-y-auto"><div class="cursor-pointer p-3 rounded-xl bg-indigo-100 dark:bg-indigo-900/30 shadow-sm" onclick="switchRoom('global')"><i class="fas fa-globe text-indigo-500"></i> Global Chat</div></div>
      <hr class="my-3">
      <p class="text-xs font-semibold text-gray-500 mb-2"><i class="fas fa-circle text-green-500 text-[8px]"></i> Online now</p>
      <div id="usersList" class="space-y-1 text-sm max-h-40 overflow-y-auto"></div>
    </div>
    <div class="lg:col-span-2 glass-panel rounded-2xl shadow-xl flex flex-col h-[70vh]">
      <div class="p-4 border-b"><span id="currentRoomName" class="font-bold text-lg">Global Chat</span><div id="roomStatus" class="text-xs text-gray-500"></div></div>
      <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-3 chat-scroll bg-[#f8f9fc] dark:bg-gray-900/30"></div>
      <div id="replyPreview" class="mx-4 mt-2 text-xs hidden bg-white/50 rounded-lg p-2"></div>
      <div class="p-4 border-t">
        <div class="flex gap-2 items-center">
          <button id="attachBtn" class="text-indigo-500 hover:scale-110"><i class="fas fa-paperclip text-xl"></i></button>
          <input type="text" id="messageInput" placeholder="Type a message..." class="flex-1 border-0 bg-white/50 rounded-full px-5 py-2.5 focus:ring-2 focus:ring-indigo-300 outline-none">
          <button id="sendBtn" class="bg-gradient-to-r from-emerald-500 to-teal-500 text-white p-2.5 rounded-full shadow-md hover:scale-105"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  const firebaseConfig = { apiKey: "AIzaSyBR0RDkC8SsT7v89eH4qBX6q_87UyqcYWc", authDomain: "smuk-library.firebaseapp.com", databaseURL: "https://smuk-library-default-rtdb.firebaseio.com/", projectId: "smuk-library", storageBucket: "smuk-library.firebasestorage.app", messagingSenderId: "101518774671", appId: "1:101518774671:web:24c6c9c2574f230639fbfa" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const storage = firebase.storage();

  let currentUserName = localStorage.getItem('chat_username') || `Guest_${Math.floor(Math.random()*1000)}`;
  localStorage.setItem('chat_username', currentUserName);
  document.getElementById('currentUserSpan').innerText = currentUserName;

  let currentRoomId = 'global';
  let replyTo = null;

  // Presence (online status)
  const presenceRef = db.ref(`presence/${currentUserName}`);
  presenceRef.set({ online: true, lastSeen: Date.now() });
  presenceRef.onDisconnect().update({ online: false, lastSeen: Date.now() });
  db.ref('presence').on('value', snap => {
    const users = snap.val() || {};
    const container = document.getElementById('usersList');
    container.innerHTML = '';
    for (let [name, data] of Object.entries(users)) if (data.online && name !== currentUserName) container.innerHTML += `<div class="flex items-center gap-2 py-1"><span class="online-indicator"></span><span class="text-sm">${escapeHtml(name)}</span></div>`;
  });

  function attachMessageListener() {
    db.ref('chat/global').off();
    db.ref('chat/global').on('child_added', snap => displayMessage(snap.key, snap.val()));
    db.ref('chat/global').on('child_changed', snap => updateMessage(snap.key, snap.val()));
    db.ref('chat/global').on('child_removed', snap => { const el = document.getElementById(`msg-${snap.key}`); if(el) el.remove(); });
  }
  function displayMessage(id, msg) {
    const isMe = msg.name === currentUserName;
    const chatBox = document.getElementById('chatBox');
    const replyHtml = msg.replyTo ? `<div class="text-xs border-l-2 border-indigo-300 pl-2 mb-1">↩️ ${escapeHtml(msg.replyTo.text)}</div>` : '';
    const mediaHtml = msg.image ? `<img src="${msg.image}" class="rounded-xl max-w-[200px] mt-1">` : (msg.voice ? `<audio controls src="${msg.voice}" class="mt-1"></audio>` : '');
    const canDelete = isMe ? `<button onclick="deleteMessage('${id}')" class="text-rose-400 text-xs ml-2"><i class="fas fa-trash-alt"></i></button>` : '';
    const bubbleClass = isMe ? 'bg-emerald-100 dark:bg-emerald-800/60 rounded-2xl rounded-tr-sm' : 'bg-white dark:bg-gray-800 rounded-2xl rounded-tl-sm shadow-sm';
    const div = document.createElement('div');
    div.id = `msg-${id}`;
    div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} message-slide`;
    div.innerHTML = `<div class="max-w-[75%] px-4 py-2 ${bubbleClass}"><div class="text-xs font-semibold ${isMe ? 'text-right' : ''}">${escapeHtml(msg.name)}</div>${replyHtml}<div class="break-words">${escapeHtml(msg.message || '')}</div>${mediaHtml}<div class="text-[10px] flex justify-between mt-1 opacity-60"><span>${new Date(msg.time).toLocaleTimeString()}</span><div><button onclick="setReply('${id}','${escapeHtml((msg.message || '').substring(0,30))}')" class="text-blue-500 text-xs mr-2">↩️</button>${canDelete}</div></div></div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  function updateMessage(id, msg) { const el = document.getElementById(`msg-${id}`); if(el && el.querySelector('.break-words')) el.querySelector('.break-words').innerHTML = escapeHtml(msg.message || (msg.deleted ? '🚫 Deleted' : '')); }
  window.deleteMessage = (id) => { if(confirm("Delete?")) db.ref(`chat/global/${id}`).update({ message: "🚫 Deleted", deleted: true }); };
  window.setReply = (id, text) => { replyTo = { id, text }; document.getElementById('replyPreview').innerHTML = `↩️ Replying to: ${text} <button onclick="cancelReply()" class="text-rose-500 ml-2">✖</button>`; document.getElementById('replyPreview').classList.remove('hidden'); };
  window.cancelReply = () => { replyTo = null; document.getElementById('replyPreview').classList.add('hidden'); };
  function sendMessage(text, mediaUrl = null) {
    if (!text.trim() && !mediaUrl) return;
    const msgObj = { name: currentUserName, message: text, time: Date.now(), readBy: { [currentUserName]: true } };
    if (replyTo) { msgObj.replyTo = replyTo; cancelReply(); }
    if (mediaUrl) msgObj.image = mediaUrl;
    db.ref('chat/global').push(msgObj);
    document.getElementById('messageInput').value = '';
  }
  document.getElementById('sendBtn').onclick = () => sendMessage(document.getElementById('messageInput').value);
  document.getElementById('messageInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(e.target.value); });
  document.getElementById('attachBtn').onclick = () => { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = async e => { const file = e.target.files[0]; if(file){ const ref = storage.ref(`chat_images/${Date.now()}_${file.name}`); await ref.put(file); const url = await ref.getDownloadURL(); sendMessage('', url); } }; input.click(); };
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  attachMessageListener();
</script>
</body>
</html>
