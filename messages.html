<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📢 School Announcements</title>
    <!-- Tailwind + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database-compat.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .announcement-card {
            transition: all 0.2s ease;
            border-left: 4px solid #4f46e5;
        }
        .announcement-card:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -12px rgba(0,0,0,0.2); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">

    <!-- Header (always visible) -->
    <div class="bg-white shadow-md sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-3">
            <div class="flex items-center gap-2">
                <i class="fas fa-bullhorn text-indigo-600 text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800">📢 School Announcements</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="userRoleBadge" class="text-xs bg-gray-200 px-2 py-1 rounded-full hidden"></span>
                <span id="userNameDisplay" class="text-sm font-medium text-gray-700 hidden"></span>
                <button id="loginBtn" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">🔐 Staff Login</button>
                <button id="logoutBtn" class="text-red-500 text-sm hover:underline hidden">Sign out</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <!-- Create Announcement Panel (visible only for admin/teacher after login) -->
        <div id="createPanel" class="bg-white rounded-2xl shadow-md p-5 mb-8 hidden">
            <h2 class="text-lg font-bold mb-3 flex items-center gap-2"><i class="fas fa-pen-alt text-indigo-500"></i> Post New Announcement</h2>
            <input type="text" id="announcementTitle" placeholder="Title" class="w-full border rounded-xl px-4 py-2 mb-2 focus:ring-2 focus:ring-indigo-300">
            <textarea id="announcementContent" rows="3" placeholder="Announcement content..." class="w-full border rounded-xl px-4 py-2 mb-2 focus:ring-2 focus:ring-indigo-300"></textarea>
            <div class="flex justify-end">
                <button onclick="createAnnouncement()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl hover:bg-indigo-700 transition">📢 Publish Announcement</button>
            </div>
        </div>

        <!-- Announcements Feed (public) -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">
            <div class="bg-gray-50 px-5 py-3 border-b">
                <h2 class="font-semibold text-gray-700"><i class="fas fa-newspaper"></i> Latest Announcements</h2>
            </div>
            <div id="announcementsList" class="divide-y divide-gray-100 max-h-[70vh] overflow-y-auto p-4 space-y-4">
                <div class="text-center text-gray-400 py-8">Loading announcements...</div>
            </div>
        </div>
    </div>

    <!-- Login Modal (shown when staff tries to write) -->
    <div id="authModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 hidden">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <div class="text-center mb-5">
                <i class="fas fa-bullhorn text-4xl text-indigo-600"></i>
                <h2 class="text-2xl font-bold mt-2">Staff Login Required</h2>
                <p class="text-gray-500 text-sm">Sign in to post or manage announcements</p>
            </div>
            <div class="space-y-3">
                <input type="email" id="modalEmail" placeholder="Email" class="w-full border rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-400">
                <input type="password" id="modalPassword" placeholder="Password" class="w-full border rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-400">
                <button onclick="loginFromModal()" class="w-full bg-indigo-600 text-white py-2 rounded-xl font-semibold hover:bg-indigo-700 transition">Sign In</button>
            </div>
            <p class="text-center text-xs text-gray-400 mt-4">New staff? Contact admin for account creation.</p>
            <button onclick="closeModal()" class="absolute top-2 right-2 text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <script>
        // ========== FIREBASE CONFIG (same as your project) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBR0RDkC8SsT7v89eH4qBX6q_87UyqcYWc",
            authDomain: "smuk-library.firebaseapp.com",
            databaseURL: "https://smuk-library-default-rtdb.firebaseio.com/",
            projectId: "smuk-library",
            storageBucket: "smuk-library.firebasestorage.app",
            messagingSenderId: "101518774671",
            appId: "1:101518774671:web:24c6c9c2574f230639fbfa",
            measurementId: "G-9M8VW7EL0B"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentUserRole = null;

        const announcementsList = document.getElementById('announcementsList');
        const createPanel = document.getElementById('createPanel');
        const userRoleBadge = document.getElementById('userRoleBadge');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const authModal = document.getElementById('authModal');

        // ========== PUBLIC ANNOUNCEMENTS (no login needed) ==========
        function loadAnnouncements() {
            db.ref('announcements').orderByChild('timestamp').on('value', (snapshot) => {
                const announcements = snapshot.val();
                announcementsList.innerHTML = '';
                if (!announcements) {
                    announcementsList.innerHTML = '<div class="text-center text-gray-400 py-10">No announcements yet. Check back later!</div>';
                    return;
                }
                const annArray = Object.values(announcements).sort((a,b) => b.timestamp - a.timestamp);
                annArray.forEach(ann => {
                    const date = new Date(ann.timestamp).toLocaleString();
                    const editDeleteBtns = (currentUser && (currentUserRole === 'admin' || currentUserRole === 'teacher')) ? `
                        <div class="flex gap-2">
                            <button onclick="editAnnouncement('${ann.id}', '${escapeHtml(ann.title).replace(/'/g, "\\'")}', '${escapeHtml(ann.content).replace(/'/g, "\\'")}')" class="text-blue-500 hover:text-blue-700 text-sm"><i class="fas fa-edit"></i> Edit</button>
                            <button onclick="deleteAnnouncement('${ann.id}')" class="text-red-500 hover:text-red-700 text-sm"><i class="fas fa-trash-alt"></i> Delete</button>
                        </div>
                    ` : '';
                    const editedBadge = ann.edited ? '<span class="text-xs text-gray-400 ml-2">(edited)</span>' : '';
                    announcementsList.innerHTML += `
                        <div class="announcement-card bg-white rounded-xl p-5 shadow-sm border border-gray-100 fade-in">
                            <div class="flex justify-between items-start flex-wrap gap-2">
                                <h3 class="font-bold text-lg text-gray-800">${escapeHtml(ann.title)}${editedBadge}</h3>
                                ${editDeleteBtns}
                            </div>
                            <p class="text-gray-700 mt-2 whitespace-pre-line">${escapeHtml(ann.content)}</p>
                            <div class="flex justify-between items-center mt-3 text-xs text-gray-400">
                                <span><i class="fas fa-user"></i> ${escapeHtml(ann.author)} (${ann.authorRole})</span>
                                <span><i class="far fa-clock"></i> ${date}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // ========== AUTH (only for write actions) ==========
        function updateUI() {
            if (currentUser && (currentUserRole === 'admin' || currentUserRole === 'teacher')) {
                createPanel.classList.remove('hidden');
                userRoleBadge.classList.remove('hidden');
                userNameDisplay.classList.remove('hidden');
                userRoleBadge.innerText = currentUserRole.toUpperCase();
                userNameDisplay.innerText = currentUser.email.split('@')[0];
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
            } else {
                createPanel.classList.add('hidden');
                userRoleBadge.classList.add('hidden');
                userNameDisplay.classList.add('hidden');
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
            }
            // Re-render announcements to show/hide edit/delete buttons
            loadAnnouncements();
        }

        async function loginFromModal() {
            const email = document.getElementById('modalEmail').value.trim();
            const password = document.getElementById('modalPassword').value;
            if (!email || password.length < 6) {
                alert("Please enter email and password (min 6 chars)");
                return;
            }
            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                currentUser = userCred.user;
                const userSnap = await db.ref(`users/${currentUser.uid}`).once('value');
                const userData = userSnap.val();
                currentUserRole = userData?.role || 'student';
                closeModal();
                updateUI();
            } catch (error) {
                alert("Login failed: " + error.message);
            }
        }

        function logout() {
            auth.signOut().then(() => {
                currentUser = null;
                currentUserRole = null;
                updateUI();
            });
        }

        function openModal() {
            authModal.classList.remove('hidden');
        }
        function closeModal() {
            authModal.classList.add('hidden');
        }

        // ========== CRUD OPERATIONS (require auth) ==========
        async function createAnnouncement() {
            if (!currentUser || (currentUserRole !== 'admin' && currentUserRole !== 'teacher')) {
                openModal();
                return;
            }
            const title = document.getElementById('announcementTitle').value.trim();
            const content = document.getElementById('announcementContent').value.trim();
            if (!title || !content) {
                showToast("Title and content are required", "error");
                return;
            }
            const newAnnouncement = {
                id: db.ref('announcements').push().key,
                title: title,
                content: content,
                author: currentUser.email,
                authorRole: currentUserRole,
                timestamp: Date.now(),
                edited: false
            };
            await db.ref(`announcements/${newAnnouncement.id}`).set(newAnnouncement);
            document.getElementById('announcementTitle').value = '';
            document.getElementById('announcementContent').value = '';
            showToast("Announcement published!", "success");
        }

        async function deleteAnnouncement(announcementId) {
            if (!currentUser || (currentUserRole !== 'admin' && currentUserRole !== 'teacher')) {
                openModal();
                return;
            }
            if (!confirm("Delete this announcement permanently?")) return;
            await db.ref(`announcements/${announcementId}`).remove();
            showToast("Announcement deleted", "info");
        }

        async function editAnnouncement(announcementId, currentTitle, currentContent) {
            if (!currentUser || (currentUserRole !== 'admin' && currentUserRole !== 'teacher')) {
                openModal();
                return;
            }
            const newTitle = prompt("Edit title:", currentTitle);
            if (newTitle === null) return;
            const newContent = prompt("Edit content:", currentContent);
            if (newContent === null) return;
            if (newTitle.trim() === "" || newContent.trim() === "") {
                alert("Title and content cannot be empty");
                return;
            }
            await db.ref(`announcements/${announcementId}`).update({
                title: newTitle.trim(),
                content: newContent.trim(),
                edited: true,
                lastEdited: Date.now()
            });
            showToast("Announcement updated", "success");
        }

        // ========== UTILITIES ==========
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 toast bg-white shadow-lg rounded-lg px-4 py-2 text-sm border-l-4 ${type === 'success' ? 'border-green-500' : (type === 'error' ? 'border-red-500' : 'border-blue-500')} z-50`;
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== INIT ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const userSnap = await db.ref(`users/${user.uid}`).once('value');
                const userData = userSnap.val();
                currentUserRole = userData?.role || 'student';
            } else {
                currentUser = null;
                currentUserRole = null;
            }
            updateUI();
        });

        loginBtn.onclick = openModal;
        logoutBtn.onclick = logout;

        // Start loading announcements immediately (public)
        loadAnnouncements();
    </script>
</body>
</html>
