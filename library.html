<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Student Library | View Books</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* keep your existing styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
    /* ... (copy your existing library styles) ... */
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-indigo-50">
<div class="max-w-7xl mx-auto px-4 py-6 md:py-10">
  <!-- Header -->
  <div class="flex flex-wrap justify-between items-center mb-8 border-b border-indigo-200 pb-4">
    <div class="flex items-center gap-3">
      <div class="bg-indigo-700 text-white p-3 rounded-2xl shadow-md"><i class="fas fa-chalkboard-user text-xl"></i></div>
      <div><h1 class="text-3xl md:text-4xl font-bold text-slate-800">📚 Student Library</h1><p class="text-slate-500 text-sm">Browse & read digital books</p></div>
    </div>
    <div class="mt-2 sm:mt-0 bg-white/70 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm text-indigo-700 text-sm"><i class="fas fa-book-open"></i> <span id="bookCount">0 books available</span></div>
  </div>
  <!-- Search -->
  <div class="mb-6 flex flex-wrap gap-3 items-center justify-between">
    <div class="relative w-full sm:w-72"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="text" id="searchInput" placeholder="Search by title..." class="w-full pl-9 pr-4 py-2 rounded-xl border border-slate-200 bg-white shadow-sm"></div>
    <button id="refreshBtn" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-xl text-sm font-medium hover:bg-indigo-200"><i class="fas fa-sync-alt"></i> Refresh</button>
  </div>
  <!-- Books container -->
  <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border border-indigo-100 overflow-hidden">
    <div class="bg-indigo-50/50 px-5 py-3 border-b border-indigo-100 flex justify-between items-center">
      <div><i class="fas fa-book text-indigo-600"></i> <span class="font-semibold text-slate-700">Digital Collection</span></div>
      <span class="text-xs text-slate-500"><i class="fas fa-eye"></i> Click any book to read online</span>
    </div>
    <div id="booksContainer" class="book-grid p-5"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBR0RDkC8SsT7v89eH4qBX6q_87UyqcYWc",
    authDomain: "smuk-library.firebaseapp.com",
    databaseURL: "https://smuk-library-default-rtdb.firebaseio.com/",
    projectId: "smuk-library",
    storageBucket: "smuk-library.firebasestorage.app",
    messagingSenderId: "101518774671",
    appId: "1:101518774671:web:24c6c9c2574f230639fbfa"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let allBooks = [];
  const booksContainer = document.getElementById('booksContainer');
  const bookCountSpan = document.getElementById('bookCount');
  const searchInput = document.getElementById('searchInput');

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  function openBook(book) { if (book.url) window.open(book.url, '_blank'); else alert('No content'); }
  function renderBooks(searchTerm = '') {
    let filtered = allBooks.filter(b => b.title.toLowerCase().includes(searchTerm) || (b.author && b.author.toLowerCase().includes(searchTerm)));
    bookCountSpan.innerText = `${filtered.length} book${filtered.length !== 1 ? 's' : ''}`;
    if (!filtered.length) { booksContainer.innerHTML = '<div class="text-center py-16 text-slate-400">📭 No matching books found.</div>'; return; }
    let html = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">`;
    filtered.forEach(book => {
      html += `<div class="book-card bg-white rounded-xl shadow-md border border-slate-100 overflow-hidden flex flex-col">
        <div class="bg-gradient-to-r from-indigo-50 to-blue-50 p-4 text-center"><i class="fas ${book.type === 'pdf' ? 'fa-file-pdf text-red-500' : 'fa-book text-indigo-500'} text-5xl"></i></div>
        <div class="p-4 flex-1"><h3 class="font-bold text-slate-800">${escapeHtml(book.title)}</h3><div class="text-xs text-slate-500 mt-1">${escapeHtml(book.author || 'Unknown')}</div>
        <div class="mt-4"><button class="view-book-btn bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-1.5 rounded-lg" data-url="${book.url}"><i class="fas fa-eye"></i> Read</button></div></div>
      </div>`;
    });
    html += `</div>`;
    booksContainer.innerHTML = html;
    document.querySelectorAll('.view-book-btn').forEach(btn => btn.addEventListener('click', () => openBook({ url: btn.dataset.url })));
  }
  db.ref('books').on('value', snap => { allBooks = Object.values(snap.val() || {}); renderBooks(searchInput.value); });
  searchInput.addEventListener('input', () => renderBooks(searchInput.value.toLowerCase()));
  document.getElementById('refreshBtn').addEventListener('click', () => renderBooks(searchInput.value.toLowerCase()));
</script>
</body>
</html>
