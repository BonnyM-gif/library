<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SMUK Library | Student View</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0c12;
      --card-bg: rgba(18, 22, 35, 0.75);
      --card-border: rgba(66, 153, 225, 0.3);
      --glow-primary: #00e0ff;
      --glow-accent: #a855f7;
      --text-primary: #eef2ff;
      --text-secondary: #9ca3af;
      --radius-lg: 1.5rem;
      --radius-md: 1rem;
      --transition: all 0.2s ease;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 20% 30%, #0c0f1c, #03050b);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 2rem;
      color: var(--text-primary);
      position: relative;
    }

    /* background layers */
    .bg-particles {
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(circle at 25% 40%, rgba(0,224,255,0.05) 1px, transparent 1px),
        radial-gradient(circle at 75% 85%, rgba(168,85,247,0.05) 1px, transparent 1px);
      background-size: 48px 48px, 64px 64px;
      animation: drift 120s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes drift {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 200px 200px, -150px 150px; }
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0,224,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,224,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .library-container {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
    }

    .library-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .library-header h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(125deg, #fff, #00e0ff, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .library-header p {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-section {
      display: flex;
      justify-content: center;
      margin: 2rem 0;
    }
    #searchInput {
      width: 100%;
      max-width: 400px;
      padding: 0.8rem 1.2rem;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--card-border);
      border-radius: 60px;
      color: white;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }
    #searchInput:focus {
      border-color: var(--glow-primary);
      box-shadow: 0 0 12px rgba(0,224,255,0.3);
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .book-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
      padding: 1.5rem;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .book-card:hover {
      transform: translateY(-8px);
      border-color: var(--glow-accent);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
    }
    .book-card::after {
      content: '';
      position: absolute;
      top: var(--y, 50%);
      left: var(--x, 50%);
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,224,255,0.15) 0%, rgba(0,0,0,0) 70%);
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.2s ease-out;
      border-radius: 50%;
      pointer-events: none;
    }
    .book-card:hover::after {
      transform: translate(-50%, -50%) scale(1);
    }

    .book-cover-icon {
      font-size: 3rem;
      text-align: center;
      background: rgba(0,0,0,0.3);
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-bottom: 1.2rem;
      transition: transform 0.2s;
    }
    .book-card:hover .book-cover-icon {
      transform: scale(1.02);
    }

    .book-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }
    .book-author {
      font-size: 0.85rem;
      color: var(--glow-primary);
      letter-spacing: 0.5px;
      margin-bottom: 0.75rem;
    }
    .book-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 1rem;
    }
    .book-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      border-top: 1px dashed rgba(66,153,225,0.3);
      padding-top: 0.75rem;
    }
    .read-link {
      background: transparent;
      border: 1px solid var(--glow-accent);
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      color: var(--glow-accent);
      display: inline-block;
    }
    .read-link:hover {
      background: var(--glow-accent);
      color: #fff;
    }
    .back-btn {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: white;
      text-decoration: none;
      margin-bottom: 1rem;
      transition: 0.2s;
      border: 1px solid rgba(0,224,255,0.3);
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateX(-3px);
    }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .library-header h1 { font-size: 2rem; }
      .book-grid { gap: 1.2rem; }
    }

    ::-webkit-scrollbar {
      width: 6px;
      background: #0a0c12;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(#00e0ff, #a855f7);
      border-radius: 10px;
    }
    ::selection {
      background: #a855f7;
      color: #fff;
    }
  </style>
</head>
<body>
<div class="bg-particles"></div>
<div class="grid-overlay"></div>

<div class="library-container">
  <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
  <div class="library-header">
    <h1>📚 SMUK Library</h1>
    <p>Explore books and PDFs added by your admin</p>
  </div>
  <div class="search-section">
    <input type="text" id="searchInput" placeholder="🔍 Search by title, author, or description...">
  </div>
  <div class="book-grid" id="bookGrid">
    <div style="text-align:center; padding:2rem;">Loading books...</div>
  </div>
</div>

<script>
  // ---------- IndexedDB helper for PDFs ----------
  const DB_NAME = "LibraryAdminDB";
  const DB_VERSION = 1;
  const STORE_NAME = "pdf_documents";
  let db = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      if (db) { resolve(db); return; }
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        db = request.result;
        resolve(db);
      };
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        }
      };
    });
  }

  async function getPDFBlobById(pdfId) {
    const database = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = database.transaction(STORE_NAME, "readonly");
      const store = transaction.objectStore(STORE_NAME);
      const request = store.get(pdfId);
      request.onsuccess = () => {
        const record = request.result;
        if (record && record.fileData) {
          const blob = new Blob([record.fileData], { type: "application/pdf" });
          resolve(blob);
        } else {
          reject(new Error("PDF data not found"));
        }
      };
      request.onerror = (e) => reject(e.target.error);
    });
  }

  // ---------- Books data ----------
  const BOOKS_KEY = 'admin_library_books';
  let books = [];

  function loadBooks() {
    const stored = localStorage.getItem(BOOKS_KEY);
    if (stored) {
      books = JSON.parse(stored);
    } else {
      books = []; // no default books – only what admin uploads
    }
    renderBooks();
  }

  // Open book depending on type
  async function openBook(book) {
    if (book.type === 'pdf' && book.pdfId) {
      try {
        const blob = await getPDFBlobById(book.pdfId);
        const url = URL.createObjectURL(blob);
        const win = window.open();
        // For PDFs, embed in an iframe for better viewing
        win.document.write(`
          <!DOCTYPE html>
          <html>
          <head><title>${escapeHtml(book.title)}</title>
          <style>body { margin:0; padding:0; } iframe { width:100%; height:100vh; border:none; }</style>
          </head>
          <body><iframe src="${url}"></iframe></body>
          </html>
        `);
        win.document.title = book.title;
        setTimeout(() => URL.revokeObjectURL(url), 10000);
      } catch (err) {
        alert('Could not open PDF: ' + err.message);
      }
    } else if (book.type === 'link' && book.url) {
      window.open(book.url, '_blank');
    } else {
      alert('This book has no readable content.');
    }
  }

  function renderBooks() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const filtered = books.filter(book =>
      book.title.toLowerCase().includes(searchTerm) ||
      book.author.toLowerCase().includes(searchTerm) ||
      (book.description && book.description.toLowerCase().includes(searchTerm))
    );
    const grid = document.getElementById('bookGrid');
    if (!filtered.length) {
      grid.innerHTML = '<div style="text-align:center; padding:2rem;">📭 No books match your search.</div>';
      return;
    }
    grid.innerHTML = filtered.map(book => `
      <div class="book-card">
        <div class="book-cover-icon">${escapeHtml(book.icon) || (book.type === 'pdf' ? '📄' : '📖')}</div>
        <div class="book-title">${escapeHtml(book.title)}</div>
        <div class="book-author">${escapeHtml(book.author)}</div>
        <div class="book-desc">${escapeHtml(book.description || 'No description available.')}</div>
        <div class="book-meta">
          <span>📅 ${book.year || '—'}</span>
          <button class="read-link" onclick="openBook(${JSON.stringify(book).replace(/\\/g, '\\\\')})">📖 Read →</button>
        </div>
      </div>
    `).join('');

    // reattach mouse move effect for 3D glare
    document.querySelectorAll('.book-card').forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--x', `${x}px`);
        card.style.setProperty('--y', `${y}px`);
      });
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Search listener
  document.getElementById('searchInput').addEventListener('input', renderBooks);

  // Initial load
  loadBooks();
</script>
</body>
</html>
