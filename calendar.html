<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SMUK School Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Poppins', sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #0b0e17);
            color: #eef2ff;
            padding: 24px;
            position: relative;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .calendar-card {
            flex: 1.2;
            min-width: 320px;
            background: rgba(18, 22, 35, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(72, 187, 255, 0.2);
            transition: all 0.2s ease;
        }

        .schedule-card {
            flex: 1.8;
            min-width: 340px;
            background: rgba(12, 15, 26, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.6rem;
            border: 1px solid rgba(0, 198, 255, 0.25);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 12px;
        }
        .month-nav {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            background: rgba(0, 198, 255, 0.12);
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            width: 40px;
            height: 40px;
            border-radius: 60px;
            cursor: pointer;
            color: #00c6ff;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover {
            background: #00c6ff;
            color: #0a0f1e;
            transform: scale(1.02);
        }
        .month-title {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #FFFFFF, #88ddff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .today-btn {
            background: rgba(255, 90, 90, 0.2);
            border: 1px solid #ff5a5a;
            color: #ff9e8f;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .today-btn:hover {
            background: #ff5a5a;
            color: white;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin: 20px 0 12px 0;
            font-weight: 600;
            color: #9aa4bf;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dates-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .date-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(25, 30, 45, 0.6);
            border-radius: 18px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            border: 1px solid transparent;
        }
        .date-cell:hover {
            background: #2a3448;
            transform: translateY(-2px);
        }
        .date-cell.today {
            background: linear-gradient(145deg, #ff5a5a, #e03a3a);
            color: white;
            box-shadow: 0 6px 14px rgba(255, 80, 80, 0.3);
            font-weight: 700;
        }
        .date-cell.selected {
            background: #00c6ff;
            color: #0a0f1e;
            border: 1px solid #ffffffcc;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(0,198,255,0.4);
        }
        .lesson-dot {
            width: 6px;
            height: 6px;
            background: #00e0ff;
            border-radius: 10px;
            margin-top: 3px;
            box-shadow: 0 0 4px #00e0ff;
        }
        .date-number {
            font-weight: 600;
        }
        .empty-cell {
            aspect-ratio: 1 / 1;
        }

        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px dashed #2a3448;
            padding-bottom: 12px;
        }
        .selected-date-title {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(120deg, #fff, #80dcff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .lesson-count {
            background: #1e2a3a;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .lessons-container {
            max-height: 380px;
            overflow-y: auto;
            padding-right: 6px;
            margin: 20px 0;
        }
        .lesson-card {
            background: rgba(25, 32, 48, 0.8);
            border-radius: 1.2rem;
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid #00c6ff;
            transition: 0.15s;
        }
        .lesson-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .lesson-subject {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .lesson-time {
            font-size: 0.75rem;
            color: #b9c7e0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .lesson-actions {
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 40px;
            transition: 0.15s;
            color: #cdd9ff;
        }
        .icon-btn:hover {
            background: #2f3b5c;
            transform: scale(1.05);
        }
        .delete-btn:hover {
            color: #ff8080;
        }
        .empty-message {
            text-align: center;
            padding: 2rem;
            color: #7e89aa;
            font-style: italic;
        }

        .form-section {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 1.5rem;
            padding: 18px;
        }
        .form-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        input, select {
            width: 100%;
            background: #11161f;
            border: 1px solid #2c3548;
            padding: 12px 14px;
            border-radius: 1rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #00c6ff;
            box-shadow: 0 0 6px #00c6ff66;
        }
        .btn-primary {
            background: linear-gradient(95deg, #00c6ff, #0077ff);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            width: 100%;
        }
        .btn-secondary {
            background: #2a3448;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            color: #ddd;
        }
        .btn-secondary:hover {
            background: #3e4a66;
        }
        .flex-btns {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .danger-btn {
            background: #a13333a0;
        }
        .danger-btn:hover {
            background: #c44545;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .top-btn {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }
        .top-btn:hover {
            background: rgba(0, 242, 255, 0.2);
            transform: translateY(-2px);
        }

        .login-prompt {
            text-align: center;
            padding: 3rem;
            background: rgba(0,0,0,0.4);
            border-radius: 2rem;
            margin: 2rem auto;
            max-width: 500px;
        }
        .login-prompt i {
            font-size: 3rem;
            color: #a5b4fc;
            margin-bottom: 1rem;
        }
        .login-prompt h3 {
            color: white;
            margin-bottom: 0.5rem;
        }
        .login-prompt a {
            display: inline-block;
            margin-top: 1rem;
            background: #4f46e5;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1e2438;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #00c6ff;
            border-radius: 10px;
        }
        @media (max-width: 780px) {
            body { padding: 16px; }
            .date-cell { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>

<div class="dashboard">
    <div style="width:100%; margin-bottom: 10px;">
        <div class="top-bar">
            <a href="dashboard.html" class="top-btn">← Dashboard</a>
            <a href="#" onclick="logout()" class="top-btn">🚪 Logout</a>
        </div>
    </div>

    <div id="mainContent" style="display: none; width:100%; display:flex; flex-wrap:wrap; gap:24px;">
        <!-- LEFT CALENDAR PANEL -->
        <div class="calendar-card">
            <div class="calendar-header">
                <div class="month-nav">
                    <button class="nav-btn" id="prevMonthBtn">◀</button>
                    <button class="nav-btn" id="nextMonthBtn">▶</button>
                </div>
                <h3 class="month-title" id="monthYearDisplay">March 2026</h3>
                <button class="today-btn" id="todayBtn">📅 Today</button>
            </div>

            <div class="weekdays">
                <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
            </div>
            <div class="dates-grid" id="datesGrid"></div>
        </div>

        <!-- RIGHT SCHEDULE PANEL -->
        <div class="schedule-card">
            <div class="schedule-header">
                <div>
                    <span class="selected-date-title" id="selectedDateLabel">📌 No date selected</span>
                </div>
                <div class="lesson-count" id="lessonCountBadge">0 lessons</div>
            </div>

            <div id="lessonsList" class="lessons-container">
                <div class="empty-message">✨ Click on a date to view or add lessons</div>
            </div>

            <!-- Admin-only form (hidden for students) -->
            <div id="adminControls" style="display: none;">
                <div class="form-section">
                    <div class="form-title">
                        <strong>✏️ Manage Lesson</strong>
                        <button id="cancelEditBtn" class="btn-secondary" style="display:none;">Cancel Edit</button>
                    </div>
                    <div class="form-group">
                        <input type="text" id="subjectInput" placeholder="Subject name (e.g., Mathematics)" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <input type="text" id="timeInput" placeholder="Time (e.g., 09:30 AM / 14:00)">
                    </div>
                    <button id="saveLessonBtn" class="btn-primary">➕ Add Lesson</button>
                    <div class="flex-btns">
                        <button id="deleteAllBtn" class="btn-secondary danger-btn" style="background:#882d2d;">🗑️ Delete all for date</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Prompt (shown when not logged in) -->
    <div id="loginPrompt" class="login-prompt" style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%;">
        <i class="fas fa-lock"></i>
        <h3>Please log in to view the school calendar</h3>
        <p>You need to be signed in to see upcoming lessons and events.</p>
        <a href="login.html">Go to Login Page</a>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database-compat.js"></script>

<script>
    // ========== FIREBASE CONFIGURATION ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBR0RDkC8SsT7v89eH4qBX6q_87UyqcYWc",
        authDomain: "smuk-library.firebaseapp.com",
        databaseURL: "https://smuk-library-default-rtdb.firebaseio.com/",
        projectId: "smuk-library",
        storageBucket: "smuk-library.firebasestorage.app",
        messagingSenderId: "101518774671",
        appId: "1:101518774671:web:24c6c9c2574f230639fbfa",
        measurementId: "G-9M8VW7EL0B"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Global state
    let currentUser = null;
    let isAdmin = false;
    let currentDisplayDate = new Date();
    let selectedDateKey = null;
    let editMode = false;
    let editLessonId = null;

    // DOM elements
    const mainContent = document.getElementById('mainContent');
    const loginPromptDiv = document.getElementById('loginPrompt');
    const datesGrid = document.getElementById('datesGrid');
    const monthYearDisplay = document.getElementById('monthYearDisplay');
    const selectedDateLabel = document.getElementById('selectedDateLabel');
    const lessonCountBadge = document.getElementById('lessonCountBadge');
    const lessonsList = document.getElementById('lessonsList');
    const subjectInput = document.getElementById('subjectInput');
    const timeInput = document.getElementById('timeInput');
    const saveLessonBtn = document.getElementById('saveLessonBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const deleteAllBtn = document.getElementById('deleteAllBtn');
    const adminControls = document.getElementById('adminControls');

    // Helper: format date key YYYY-MM-DD
    function formatDateKey(year, month, day) {
        return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    function getTodayKey() {
        const today = new Date();
        return formatDateKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== FIREBASE REALTIME: LESSONS ==========
    let lessonsListener = null;

    function listenToLessons(dateKey) {
        if (lessonsListener) lessonsListener();
        const lessonsRef = db.ref(`lessons/${dateKey}`);
        lessonsListener = lessonsRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            renderLessonsForDate(data);
        });
    }

    async function addOrUpdateLesson(dateKey, lessonId, subject, time) {
        const lessonRef = db.ref(`lessons/${dateKey}/${lessonId || Date.now() + '_' + Math.random()}`);
        await lessonRef.set({
            subject: subject,
            time: time,
            createdAt: firebase.database.ServerValue.TIMESTAMP
        });
    }

    async function deleteLesson(dateKey, lessonId) {
        await db.ref(`lessons/${dateKey}/${lessonId}`).remove();
    }

    async function deleteAllLessonsForDate(dateKey) {
        await db.ref(`lessons/${dateKey}`).remove();
    }

    // ========== CALENDAR RENDERING ==========
    function renderCalendar() {
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        const firstDayOfMonth = new Date(year, month, 1);
        let startWeekday = firstDayOfMonth.getDay();
        let startOffset = startWeekday === 0 ? 6 : startWeekday - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        monthYearDisplay.innerText = currentDisplayDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        datesGrid.innerHTML = '';

        const todayKey = getTodayKey();

        for (let i = 0; i < startOffset; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.classList.add('empty-cell');
            datesGrid.appendChild(emptyDiv);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const cellKey = formatDateKey(year, month + 1, d);
            const isToday = (todayKey === cellKey);
            const isSelected = (selectedDateKey === cellKey);

            const dateDiv = document.createElement('div');
            dateDiv.className = 'date-cell';
            if (isToday) dateDiv.classList.add('today');
            if (isSelected) dateDiv.classList.add('selected');

            const numberSpan = document.createElement('span');
            numberSpan.className = 'date-number';
            numberSpan.innerText = d;
            dateDiv.appendChild(numberSpan);

            // Check if there are lessons for this date (async, but we'll show dot after checking)
            db.ref(`lessons/${cellKey}`).once('value', (snap) => {
                if (snap.exists() && snap.numChildren() > 0) {
                    const dotSpan = document.createElement('div');
                    dotSpan.className = 'lesson-dot';
                    dateDiv.appendChild(dotSpan);
                }
            });

            dateDiv.addEventListener('click', (function(key) {
                return function() { selectDate(key); };
            })(cellKey));

            datesGrid.appendChild(dateDiv);
        }
    }

    async function selectDate(dateKey) {
        selectedDateKey = dateKey;
        editMode = false;
        editLessonId = null;
        if (saveLessonBtn) saveLessonBtn.innerText = '➕ Add Lesson';
        if (cancelEditBtn) cancelEditBtn.style.display = 'none';
        if (subjectInput) subjectInput.value = '';
        if (timeInput) timeInput.value = '';
        renderCalendar();
        listenToLessons(dateKey);
        updateDateLabel(dateKey);
    }

    function updateDateLabel(dateKey) {
        const [year, month, day] = dateKey.split('-');
        const dateObj = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
        const formatted = dateObj.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        selectedDateLabel.innerHTML = `📅 ${formatted}`;
    }

    function renderLessonsForDate(lessonsData) {
        const lessons = Object.entries(lessonsData || {}).map(([id, data]) => ({ id, ...data }));
        lessonCountBadge.innerText = `${lessons.length} lesson${lessons.length !== 1 ? 's' : ''}`;
        if (lessons.length === 0) {
            lessonsList.innerHTML = '<div class="empty-message">📭 No lessons scheduled. Add one below ✨</div>';
            return;
        }
        lessonsList.innerHTML = '';
        lessons.forEach(lesson => {
            const card = document.createElement('div');
            card.className = 'lesson-card';
            const infoDiv = document.createElement('div');
            infoDiv.className = 'lesson-info';
            const subjectSpan = document.createElement('div');
            subjectSpan.className = 'lesson-subject';
            subjectSpan.innerText = escapeHtml(lesson.subject);
            const timeSpan = document.createElement('div');
            timeSpan.className = 'lesson-time';
            timeSpan.innerHTML = `⏰ ${escapeHtml(lesson.time || 'Not specified')}`;
            infoDiv.appendChild(subjectSpan);
            infoDiv.appendChild(timeSpan);
            card.appendChild(infoDiv);

            if (isAdmin) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'lesson-actions';
                const editBtn = document.createElement('button');
                editBtn.innerHTML = '✏️';
                editBtn.className = 'icon-btn';
                editBtn.title = 'Edit lesson';
                editBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    startEditLesson(lesson);
                });
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '❌';
                deleteBtn.className = 'icon-btn delete-btn';
                deleteBtn.title = 'Delete lesson';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`Delete "${lesson.subject}" lesson?`)) {
                        deleteLesson(selectedDateKey, lesson.id);
                    }
                });
                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);
                card.appendChild(actionsDiv);
            }
            lessonsList.appendChild(card);
        });
    }

    function startEditLesson(lesson) {
        if (!isAdmin) return;
        editMode = true;
        editLessonId = lesson.id;
        subjectInput.value = lesson.subject;
        timeInput.value = lesson.time || '';
        saveLessonBtn.innerText = '🔄 Update Lesson';
        cancelEditBtn.style.display = 'inline-block';
    }

    function cancelEdit() {
        editMode = false;
        editLessonId = null;
        subjectInput.value = '';
        timeInput.value = '';
        saveLessonBtn.innerText = '➕ Add Lesson';
        cancelEditBtn.style.display = 'none';
    }

    async function saveLesson() {
        if (!isAdmin || !selectedDateKey) {
            alert("Please select a date first.");
            return;
        }
        let subject = subjectInput.value.trim();
        let time = timeInput.value.trim();
        if (subject === "") {
            alert("Please enter a subject name.");
            return;
        }
        if (time === "") time = "To be defined";
        try {
            await addOrUpdateLesson(selectedDateKey, editLessonId, subject, time);
            cancelEdit();
        } catch (err) {
            console.error("Error saving lesson:", err);
            alert("Failed to save lesson. Check console for details.");
        }
    }

    async function deleteAllLessons() {
        if (!isAdmin || !selectedDateKey) return;
        if (!confirm(`⚠️ Delete ALL lessons for ${selectedDateKey}? This cannot be undone.`)) return;
        try {
            await deleteAllLessonsForDate(selectedDateKey);
            cancelEdit();
        } catch (err) {
            console.error("Error deleting lessons:", err);
            alert("Failed to delete lessons.");
        }
    }

    function changeMonth(delta) {
        currentDisplayDate.setMonth(currentDisplayDate.getMonth() + delta);
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        if (selectedDateKey) {
            const [selYear, selMonth] = selectedDateKey.split('-');
            if (parseInt(selYear) !== year || parseInt(selMonth) !== (month + 1)) {
                selectedDateKey = null;
                cancelEdit();
                lessonsList.innerHTML = '<div class="empty-message">✨ Click on a date to view or add lessons</div>';
                lessonCountBadge.innerText = '0 lessons';
                selectedDateLabel.innerHTML = '📌 No date selected';
            }
        }
        renderCalendar();
    }

    function goToToday() {
        const today = new Date();
        currentDisplayDate = new Date(today.getFullYear(), today.getMonth(), 1);
        renderCalendar();
        const todayKey = getTodayKey();
        selectDate(todayKey);
    }

    // ========== AUTHENTICATION & ROLE CHECK ==========
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            mainContent.style.display = 'none';
            loginPromptDiv.style.display = 'flex';
            return;
        }
        loginPromptDiv.style.display = 'none';
        mainContent.style.display = 'flex';
        currentUser = user;
        const userSnapshot = await db.ref(`users/${user.uid}`).once('value');
        const userData = userSnapshot.val();
        isAdmin = (userData && userData.role === 'admin');
        if (isAdmin) {
            adminControls.style.display = 'block';
        } else {
            adminControls.style.display = 'none';
        }
        const now = new Date();
        currentDisplayDate = new Date(now.getFullYear(), now.getMonth(), 1);
        renderCalendar();
        const todayKey = getTodayKey();
        selectDate(todayKey);
    });

    function logout() {
        auth.signOut().then(() => {
            window.location.reload();
        });
    }

    // Event listeners
    document.getElementById('prevMonthBtn').addEventListener('click', () => changeMonth(-1));
    document.getElementById('nextMonthBtn').addEventListener('click', () => changeMonth(1));
    document.getElementById('todayBtn').addEventListener('click', goToToday);
    saveLessonBtn.addEventListener('click', saveLesson);
    cancelEditBtn.addEventListener('click', cancelEdit);
    deleteAllBtn.addEventListener('click', deleteAllLessons);

    // ========== PARTICLE BACKGROUND ==========
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];
    const PARTICLE_COUNT = 75, MAX_DIST = 130;
    function initParticles() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * width, y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.3,
                radius: Math.random() * 2.2 + 1.2,
                color: `rgba(0, ${180 + Math.random() * 75}, 255, ${0.2 + Math.random() * 0.5})`
            });
        }
    }
    function resizeCanvas() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        initParticles();
    }
    function drawParticles() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color; ctx.fill();
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = width; if (p.x > width) p.x = 0;
            if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;
        }
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.hypot(dx, dy);
                if (dist < MAX_DIST) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(0, 200, 255, ${0.08 * (1 - dist / MAX_DIST)})`;
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(drawParticles);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    drawParticles();
</script>
</body>
</html>
